<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carranza Cursos 芒聙聰 Gerador de Materiais</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>冒聼娄聟</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --vinho: #70001C;
      --vermelho: #B0002C;
      --branco: #FFFFFF;
      --cinza-bg: #F5F3F0;
      --cinza-card: #FEFEFE;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--cinza-bg);
      color: #333;
      min-height: 100vh;
      position: relative;
    }

    /* Diamond pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(45deg, var(--vinho) 25%, transparent 25%),
        linear-gradient(-45deg, var(--vinho) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--vinho) 75%),
        linear-gradient(-45deg, transparent 75%, var(--vinho) 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      pointer-events: none;
    }

    /* 芒聰聙芒聰聙 HEADER 芒聰聙芒聰聙 */
    .header {
      background: linear-gradient(135deg, var(--vinho), var(--vermelho));
      padding: 0;
      position: relative;
      z-index: 10;
      box-shadow: 0 4px 24px rgba(112,0,28,0.25);
    }
    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .header-logo img {
      width: 34px; height: 34px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px; font-weight: 800;
      color: var(--branco);
      letter-spacing: 0.02em;
    }
    .header p {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* 芒聰聙芒聰聙 MAIN 芒聰聙芒聰聙 */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 16px 40px;
      position: relative;
      z-index: 5;
    }

    .card {
      background: var(--cinza-card);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
    }

    /* 芒聰聙芒聰聙 LABELS 芒聰聙芒聰聙 */
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4A4A4A;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    /* 芒聰聙芒聰聙 FILE UPLOAD 芒聰聙芒聰聙 */
    .upload-zone {
      border: 2px dashed #D0C8C0;
      border-radius: 14px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      background: #FAFAF8;
      transition: all 0.3s ease;
      margin-bottom: 28px;
    }
    .upload-zone:hover, .upload-zone.dragging {
      border-color: var(--vermelho);
      background: rgba(112,0,28,0.03);
    }
    .upload-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(112,0,28,0.06);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .upload-text { font-size: 14px; color: #666; }
    .upload-text span { color: var(--vermelho); font-weight: 600; }
    .upload-hint { font-size: 12px; color: #999; margin-top: 6px; }

    .file-attached {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: #FAFAF8;
      border-radius: 14px;
      border: 1px solid #E8E4E0;
      margin-bottom: 28px;
    }
    .file-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(112,0,28,0.07);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .file-name {
      font-size: 14px; font-weight: 600; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-size { font-size: 12px; color: #999; margin-top: 2px; }
    .file-remove {
      background: none; border: none; cursor: pointer;
      color: #AAA; padding: 4px; border-radius: 6px;
      display: flex; transition: color 0.2s;
    }
    .file-remove:hover { color: var(--vermelho); }

    /* 芒聰聙芒聰聙 TYPE SELECTOR 芒聰聙芒聰聙 */
    .type-grid {
      display: flex; gap: 12px; margin-bottom: 28px;
    }
    .type-btn {
      flex: 1;
      padding: 16px 14px;
      border-radius: 14px;
      border: 2px solid #E8E4E0;
      background: var(--branco);
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.25s ease;
      outline: none;
    }
    .type-btn.active {
      border-color: var(--vinho);
      background: rgba(112,0,28,0.03);
    }
    .type-btn .icon { color: #999; transition: color 0.25s; }
    .type-btn.active .icon { color: var(--vinho); }
    .type-btn .label {
      font-size: 14px; font-weight: 700; color: #555; transition: color 0.25s;
    }
    .type-btn.active .label { color: var(--vinho); }
    .type-btn .desc {
      font-size: 11px; color: #AAA; margin-top: 2px; transition: color 0.25s;
    }
    .type-btn.active .desc { color: var(--vermelho); }

    /* 芒聰聙芒聰聙 INPUTS 芒聰聙芒聰聙 */
    .fields-group { margin-bottom: 28px; }
    .fields-group .field-label { margin-bottom: 12px; }
    .field-stack { display: flex; flex-direction: column; gap: 10px; }

    input[type="text"], textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1.5px solid #E0DCD8;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #333;
      background: #FAFAF8;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--vermelho);
      box-shadow: 0 0 0 3px rgba(112,0,28,0.07);
    }
    textarea { resize: vertical; line-height: 1.5; }

    .optional-badge {
      font-size: 11px; color: #BBB;
      background: #F0EEEC;
      padding: 2px 8px; border-radius: 6px;
      margin-left: 8px;
    }

    /* 芒聰聙芒聰聙 GENERATE BUTTON 芒聰聙芒聰聙 */
    .btn-generate {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--vinho), var(--vermelho));
      color: var(--branco);
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 24px rgba(112,0,28,0.2);
      transition: all 0.3s ease;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(112,0,28,0.3);
    }
    .btn-generate:disabled {
      background: #D0C8C0;
      box-shadow: none;
      cursor: default;
    }

    /* 芒聰聙芒聰聙 PROGRESS 芒聰聙芒聰聙 */
    .progress-box {
      background: rgba(112,0,28,0.04);
      border-radius: 12px;
      padding: 18px 20px;
      margin-top: 16px;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .progress-status { font-size: 13px; font-weight: 600; color: var(--vinho); }
    .progress-pct { font-size: 13px; font-weight: 700; color: var(--vinho); }
    .progress-track {
      width: 100%; height: 8px;
      border-radius: 4px;
      background: rgba(112,0,28,0.1);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--vinho), var(--vermelho));
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 芒聰聙芒聰聙 SUCCESS 芒聰聙芒聰聙 */
    .success-box {
      background: linear-gradient(135deg, rgba(112,0,28,0.04), rgba(176,0,44,0.02));
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      margin-top: 20px;
      border: 1px solid rgba(112,0,28,0.1);
    }
    .success-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(112,0,28,0.08);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-box h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px; color: var(--vinho); margin-bottom: 6px;
    }
    .success-box p { font-size: 13px; color: #888; margin-bottom: 20px; }

    .btn-download {
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--vinho), var(--vermelho));
      color: var(--branco);
      font-size: 14px; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(112,0,28,0.25);
      transition: transform 0.2s;
      margin-right: 10px;
    }
    .btn-download:hover { transform: translateY(-1px); }

    .btn-reset {
      padding: 12px 24px;
      border-radius: 12px;
      border: 2px solid rgba(112,0,28,0.2);
      background: transparent;
      color: var(--vinho);
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover {
      background: rgba(112,0,28,0.04);
      border-color: var(--vinho);
    }

    /* 芒聰聙芒聰聙 ERROR 芒聰聙芒聰聙 */
    .error-box {
      background: #FFF5F5;
      border: 1px solid #FECACA;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 16px;
      color: #991B1B;
      font-size: 13px;
      display: flex; align-items: flex-start; gap: 10px;
    }

    /* 芒聰聙芒聰聙 FOOTER 芒聰聙芒聰聙 */
    .footer {
      text-align: center;
      margin-top: 28px;
      padding: 0 20px;
    }
    .footer .citacao {
      font-size: 12px;
      color: rgba(112,0,28,0.5);
      font-style: italic;
      font-family: 'Playfair Display', Georgia, serif;
      margin-bottom: 4px;
      transition: opacity 0.5s;
    }
    .footer .copy {
      font-size: 11px; color: #BBB;
    }

    /* 芒聰聙芒聰聙 SPINNER 芒聰聙芒聰聙 */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
          <path d="M50 20 C40 25 30 40 25 55 C22 63 20 70 22 75 C25 82 35 85 45 80 C55 75 60 65 58 55" fill="white" opacity="0.9"/>
          <path d="M58 55 C56 50 52 45 48 42 C44 39 38 38 35 40 C30 44 28 50 30 56 C32 62 38 66 44 65 C50 64 55 60 58 55Z" fill="white"/>

  </main>

  <script>
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // CONFIGURA脙聡脙聝O
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬

    // 芒卢聡茂赂聫  TROQUE PELA URL DO SEU BACKEND NO RENDER  芒卢聡茂赂聫
    const API_URL = 'https://carranza-gerador.onrender.com';

    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // ESTADO
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    let state = {
      file: null,
      materialType: 'slides',
      disciplina: '',
      assunto: '',
      professor: '',
      instrucoes: '',
      isGenerating: false,
      progress: 0,
      status: '',
      isDone: false,
      error: null,
      downloadUrl: null,
      downloadName: null,
    };

    const citacoes = [
      "A for脙搂a est脙隆 em se erguer com mais poder, como a 脙隆guia.",
      "A 脙隆guia foca no futuro, n脙拢o no que est脙隆 atr脙隆s.",
      "Para voar alto, deixe as correntes para tr脙隆s, como a 脙隆guia.",
      "Nas tempestades, como a 脙隆guia, encontre o voo mais alto.",
    ];

    // Rotacionar cita脙搂脙碌es
    let citIdx = 0;
    setInterval(() => {
      citIdx = (citIdx + 1) % citacoes.length;
      const el = document.getElementById('citacao');
      if (el) el.textContent = `"${citacoes[citIdx]}"`;
    }, 5000);
    document.getElementById('citacao').textContent = `"${citacoes[0]}"`;

    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // RENDER
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    function render() {
      const app = document.getElementById('app');

      let html = '';

      // File upload
      html += `<label class="field-label">Documento de refer脙陋ncia</label>`;
      if (!state.file) {
        html += `
          <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 16V4M12 4L8 8M12 4L16 8" stroke="#70001C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 16V18C20 19.1 19.1 20 18 20H6C4.9 20 4 19.1 4 18V16" stroke="#70001C" stroke-width="2" stroke-linecap="round"/>

      } else {
        const sizeKB = (state.file.size / 1024).toFixed(1);
        html += `
          <div class="file-attached">
            <div class="file-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">

            <button class="file-remove" onclick="removeFile()">

      html += `<label class="field-label">Tipo de material</label>`;

      html += `
        <button class="type-btn ${state.materialType === 'slides' ? 'active' : ''}" onclick="setType('slides')">

              <path d="M8 21H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M12 18V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <p class="label">Slides</p>

          <div>
            <p class="label">Trabalho Dirigido</p>

      html += `</div>`;

      // Metadata fields
      html += `
        <div class="fields-group">
          <label class="field-label">Informa脙搂脙碌es da capa</label>
          <div class="field-stack">

            <input type="text" placeholder="Assunto (ex: Coloca脙搂脙拢o Pronominal)" value="${state.assunto}" oninput="state.assunto=this.value">

      html += `

      // Generate button
      const disabled = !state.file || state.isGenerating;
      if (!state.isDone) {
        html += `
          <button class="btn-generate" ${disabled ? 'disabled' : ''} onclick="gerarMaterial()">
            ${state.isGenerating
              ? `<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

                  <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="white" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

      // Progress
      if (state.isGenerating) {
        html += `

            <div class="progress-header">
              <span class="progress-status">${state.status}</span>
              <span class="progress-pct">${state.progress}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${state.progress}%"></div>
            </div>
          </div>`;
      }

      // Error
      if (state.error) {
        html += `
          <div class="error-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;margin-top:1px">
              <circle cx="12" cy="12" r="10" stroke="#991B1B" stroke-width="1.5"/>
              <path d="M12 8V12M12 16H12.01" stroke="#991B1B" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>${state.error}</span>
          </div>`;
      }

      // Success
      if (state.isDone) {
        html += `
          <div class="success-box">
            <div class="success-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M5 13L9 17L19 7" stroke="#70001C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>Material gerado!</h3>
            <p>Seu ${state.materialType === 'slides' ? 'PPTX' : 'documento'} est脙隆 pronto.</p>
            <div>
              <a class="btn-download" href="${state.downloadUrl}" download="${state.downloadName}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 4V16M12 16L8 12M12 16L16 12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                  <path d="M4 20H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Baixar ${state.downloadName}
              </a>
              <button class="btn-reset" onclick="resetAll()">Gerar outro</button>
            </div>
          </div>`;
      }

      app.innerHTML = html;

      // Setup drag and drop
      setTimeout(setupDragDrop, 50);
    }

    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // HANDLERS
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    function handleFile(e) {
      const f = e.target.files[0];
      if (f) { state.file = f; state.error = null; render(); }
    }

    function removeFile() {
      state.file = null; render();
    }

    function setType(t) {
      state.materialType = t; render();
    }

    function resetAll() {
      if (state.downloadUrl) URL.revokeObjectURL(state.downloadUrl);
      state = {
        file: null, materialType: 'slides',
        disciplina: '', assunto: '', professor: '',
        instrucoes: '',
        isGenerating: false, progress: 0, status: '',
        isDone: false, error: null,
        downloadUrl: null, downloadName: null,
      };
      render();
    }

    function setupDragDrop() {
      const zone = document.getElementById('dropzone');
      if (!zone) return;
      zone.addEventListener('dragover', e => {
        e.preventDefault(); zone.classList.add('dragging');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragging');
        const f = e.dataTransfer.files[0];
        if (f) { state.file = f; state.error = null; render(); }
      });
    }

    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // GERAR MATERIAL (CHAMADA AO BACKEND)
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    async function gerarMaterial() {
      if (!state.file) return;

      state.isGenerating = true;
      state.progress = 0;
      state.error = null;
      state.isDone = false;
      render();

      // Simula脙搂脙拢o de progresso visual enquanto o backend processa
      const progressSteps = [
        { pct: 10, msg: 'Enviando documento...' },
        { pct: 30, msg: 'Analisando conte脙潞do...' },
        { pct: 50, msg: 'Estruturando quest脙碌es...' },
        { pct: 70, msg: 'Montando slides...' },
        { pct: 85, msg: 'Aplicando layout Carranza...' },
      ];

      let stepIdx = 0;
      const progressInterval = setInterval(() => {
        if (stepIdx < progressSteps.length) {
          state.progress = progressSteps[stepIdx].pct;
          state.status = progressSteps[stepIdx].msg;
          render();
          stepIdx++;
        }
      }, 1200);

      try {
        const formData = new FormData();
        formData.append('arquivo', state.file);
        formData.append('disciplina', state.disciplina || 'Disciplina');
        formData.append('assunto', state.assunto || 'Assunto');
        formData.append('professor', state.professor || 'Professor');
        formData.append('tipo', state.materialType);
        formData.append('instrucoes', state.instrucoes);

        const response = await fetch(`${API_URL}/api/gerar`, {
          method: 'POST',
          body: formData,
        });

        clearInterval(progressInterval);

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Erro desconhecido' }));
          throw new Error(err.error || `Erro HTTP ${response.status}`);
        }

        // Sucesso - baixar blob
        const blob = await response.blob();
        const ext = state.materialType === 'slides' ? 'pptx' : 'docx';
        const nome = `Carranza_${(state.assunto || 'material').replace(/\s+/g, '_')}.${ext}`;

        state.downloadUrl = URL.createObjectURL(blob);
        state.downloadName = nome;
        state.progress = 100;
        state.status = 'Conclu脙颅do!';
        state.isDone = true;
        state.isGenerating = false;

      } catch (err) {
        clearInterval(progressInterval);
        state.isGenerating = false;
        state.progress = 0;
        state.error = err.message || 'Erro ao gerar material. Tente novamente.';
      }

      render();
    }

    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    // INIT
    // 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
    render();
  </script>
